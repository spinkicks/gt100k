name: ci

on:
  pull_request:
    branches: [main]
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # gitleaks CLI (not gitleaks-action@v2): the action makes GitHub API calls
      # (license-user lookup + PR-commits fetch) that hard-fail on any API
      # degradation. The CLI scans the checked-out tree with zero API calls and
      # auto-loads .gitleaks.toml (documented false-positive allowlist).
      # Version + sha256 are pinned (supply-chain hardening); the binary is
      # unpacked to RUNNER_TEMP so it is neither scanned nor tripping large-file.
      - name: Secret scan (gitleaks)
        run: |
          VER=8.24.3
          SHA=9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" -o "$RUNNER_TEMP/gitleaks.tgz"
          echo "${SHA}  ${RUNNER_TEMP}/gitleaks.tgz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/gitleaks.tgz" -C "$RUNNER_TEMP" gitleaks
          "$RUNNER_TEMP/gitleaks" dir . --no-banner --redact --exit-code 1

      - name: Block large files (>5MB)
        run: |
          large=$(find . -type f -not -path './.git/*' -size +5M)
          if [ -n "$large" ]; then
            echo "::error::Files larger than 5MB are not allowed:"; echo "$large"; exit 1
          fi
          echo "No oversized files."

      - name: Repo hygiene
        run: |
          echo "Tracked files: $(git ls-files | wc -l)"
          # Growable gatekeeper: add lint / type-check / test / build steps here as code lands
          # (pnpm for JS/TS, uv for Python) per the §10.5 quality tiers.
          echo "CI gatekeeper passed (docs-stage)."
