version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/gt100k/platform/proto/gen/go
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.5
    out: proto/gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go:v1.5.1
    out: proto/gen/go
    opt:
      - paths=source_relative
